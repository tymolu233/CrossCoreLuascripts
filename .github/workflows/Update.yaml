name: Check file changes
on:
  schedule:
    - cron:  '0 0-15,16-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-file:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: ['android']
        include:
          - platform: 'android'
            url: 'https://cdn.megagamelog.com/cross/release/android/curr/Custom/luascripts'
            filename: 'lua_android'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download file
      uses: nick-invision/retry@v2
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: Invoke-WebRequest -Uri "${{ matrix.url }}" -OutFile "$env:GITHUB_WORKSPACE/${{ matrix.filename }}"

    - name: Calculate hash
      id: calc-hash
      shell: pwsh
      run: |
        $hash = Get-FileHash -Path "$env:GITHUB_WORKSPACE/${{ matrix.filename }}" -Algorithm SHA256
        "hash=$($hash.Hash)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Save hash
      shell: pwsh
      run: |
        "${{ steps.calc-hash.outputs.hash }}" | Out-File -FilePath "$env:GITHUB_WORKSPACE/new-hash.txt" -NoNewline

    - name: Check hash
      id: check-hash
      shell: pwsh
      env:
        HASH: ${{ steps.calc-hash.outputs.hash }}
      run: |
        $hashFile = "$env:GITHUB_WORKSPACE/${{ matrix.platform }}-hash.txt"
        if (Test-Path -LiteralPath $hashFile) {
          $oldHash = Get-Content -LiteralPath $hashFile -Raw
          Write-Host "Old hash: $oldHash"
        } else {
          $oldHash = ""
          Write-Host "Old hash file not found, treating as changed"
        }
        Write-Host "New hash: ${env:HASH}"
        if ($oldHash.Trim() -ne "${env:HASH}") {
          Move-Item -Path "$env:GITHUB_WORKSPACE/new-hash.txt" -Destination $hashFile -Force
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        } else {
          "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        }

    - name: Unpack and Push
      if: steps.check-hash.outputs.changed == 'true'
      shell: pwsh
      run: |
        $ws = $env:GITHUB_WORKSPACE
        $tool = "$ws/CrossCore-Auto-Lua"
        $studio = "$ws/net9.0-windows"
        python "$tool/decrypt.py" "$ws/${{ matrix.filename }}"
        New-Item -ItemType Directory -Path "$ws/lua" -Force | Out-Null
        & "$studio/AssetStudio.CLI.exe" "$ws/${{ matrix.filename }}_decrypt" "$ws/lua" --game Normal --silent
        Write-Host "lua directory contents:"
        Get-ChildItem -Path "$ws/lua" -Directory | ForEach-Object { Write-Host "  $_" }
        $textAssetPath = "$ws/lua/TextAsset"
        if (Test-Path $textAssetPath) {
          python "$tool/sortFile.py" $textAssetPath "$ws/${{ matrix.platform }}" "$tool/structure.json"
        } else {
          Write-Host "TextAsset directory not found. Checking for alternative paths..."
          $found = $false
          Get-ChildItem -Path "$ws/lua" -Recurse -Directory | ForEach-Object {
            if ($_.Name -match "TextAsset|LuaScript|Script") {
              Write-Host "Found potential match: $($_.FullName)"
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "No TextAsset-like directory found. Listing all directories:"
            Get-ChildItem -Path "$ws/lua" -Recurse -Directory | ForEach-Object { Write-Host "  $($_.FullName)" }
            Write-Error "AssetStudio extraction did not produce a TextAsset directory. The game asset structure may have changed."
          }
        }

    - name: Generate commit message
      if: steps.check-hash.outputs.changed == 'true'
      id: commit-message
      shell: pwsh
      run: |
        $svnFile = "$env:GITHUB_WORKSPACE/${{ matrix.platform }}/SvnVersion.lua"
        $svnVersion = (Select-String -Path $svnFile -Pattern 'g_svnVersion = "\d+') | ForEach-Object { $_.Matches } | ForEach-Object { $_.Value } | Select-String -Pattern '\d+' | ForEach-Object { $_.Matches } | ForEach-Object { $_.Value }
        $date = Get-Date -Format "yyyy/MM/dd"
        "SVN_VERSION=$svnVersion" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_ENV
        "message=${{ matrix.platform }}-[$date]-$svnVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Commit changes
      if: steps.check-hash.outputs.changed == 'true'
      shell: pwsh
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ matrix.platform }}
        git add ${{ matrix.platform }}-hash.txt
        git commit -m "${{ steps.commit-message.outputs.message }}" || true

    - name: Pull and rebase latest changes
      if: steps.check-hash.outputs.changed == 'true'
      shell: pwsh
      run: |
        git pull --rebase origin ${{ github.ref }}

    - name: Push changes
      if: steps.check-hash.outputs.changed == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
